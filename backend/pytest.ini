[pytest]
# Silence pytest-asyncio deprecation by setting the default loop scope explicitly.
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore:The 'app' shortcut is now deprecated.*:DeprecationWarning:httpx\._client
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
    ignore:unclosed event loop.*:ResourceWarning:asyncio\.base_events
    ignore:Unclosed <MemoryObject.*:ResourceWarning:anyio\.streams\.memory
