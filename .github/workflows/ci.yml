name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentb
          POSTGRES_PASSWORD: AgentB#Lily2026!
          POSTGRES_DB: agent_b
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U agentb -d agent_b"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Backend lint (ruff)
        run: |
          ruff check app tests

      - name: Backend syntax check (compileall)
        run: |
          python -m compileall -q app tests

      - name: Run backend tests
        env:
          # Run tests without requiring a real DB
          DATABASE_URL: ''
        run: |
          pytest -q

      - name: Backend API smoke (boot + health/tools + sessions)
        env:
          DATABASE_URL: 'postgresql+asyncpg://agentb:AgentB#Lily2026!@127.0.0.1:5433/agent_b'
          AUTH_ENABLED: 'false'
        run: |
          set -euo pipefail

          # Ensure schema exists (tables, alembic_version)
          python -c "from app.migrations import run_migrations; import json; print(json.dumps(run_migrations()))"

          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!

          # Wait for server
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null; then
              break
            fi
            sleep 1
          done

          echo "--- /health"
          curl -fsS http://127.0.0.1:8000/api/v1/health | head -c 400
          echo

          echo "--- /tools"
          curl -fsS http://127.0.0.1:8000/api/v1/tools | head -c 400
          echo

          echo "--- POST /sessions"
          SESSION_JSON=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/sessions \
            -H 'Content-Type: application/json' \
            -d '{"title":"ci-smoke","mode":"engineering"}')
          echo "$SESSION_JSON" | head -c 400
          echo
          SESSION_ID=$(python -c "import sys,json; print(json.load(sys.stdin)['id'])" <<< "$SESSION_JSON")
          echo "session_id=$SESSION_ID"

          echo "--- GET /sessions"
          curl -fsS http://127.0.0.1:8000/api/v1/sessions | head -c 400
          echo

          echo "--- Tool execute: file_write"
          WRITE_JSON=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/tools/execute \
            -H 'Content-Type: application/json' \
            -d '{"tool_name":"file_write","args":{"path":"ci/smoke.txt","text":"hello from ci","overwrite":true},"session_id":"'$SESSION_ID'"}')
          echo "$WRITE_JSON" | head -c 400
          echo

          echo "--- Tool execute: file_read (assert contains text)"
          READ_JSON=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/tools/execute \
            -H 'Content-Type: application/json' \
            -d '{"tool_name":"file_read","args":{"path":"ci/smoke.txt"},"session_id":"'$SESSION_ID'"}')
          echo "$READ_JSON" | head -c 400
          echo

          python -c "import sys,json; j=json.load(sys.stdin); assert j.get('success') is True; txt=j.get('output',{}).get('text',''); assert 'hello from ci' in txt" <<< "$READ_JSON"

          echo "--- Tool execute: shell_exec (python --version)"
          SHELL_JSON=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/tools/execute \
            -H 'Content-Type: application/json' \
            -d '{"tool_name":"shell_exec","args":{"command":"python --version"},"session_id":"'$SESSION_ID'"}')
          echo "$SHELL_JSON" | head -c 400
          echo

          python -c "import sys,json; j=json.load(sys.stdin); assert j.get('success') is True; out=j.get('output',{}); assert out.get('exit_code')==0; assert 'Python' in (out.get('stdout','')+out.get('stderr',''))" <<< "$SHELL_JSON"

          echo "--- Create artifact (POST /sessions/{id}/artifacts)"
          ART_JSON=$(curl -fsS -X POST http://127.0.0.1:8000/api/v1/sessions/$SESSION_ID/artifacts \
            -H 'Content-Type: application/json' \
            -d '{"filename":"ci_artifact.md","content":"# CI Artifact\n\nThis artifact was created by CI.","artifact_type":"file"}')
          echo "$ART_JSON" | head -c 400
          echo
          ART_ID=$(python -c "import sys,json; print(json.load(sys.stdin)['id'])" <<< "$ART_JSON")
          echo "artifact_id=$ART_ID"

          echo "--- List session artifacts"
          curl -fsS http://127.0.0.1:8000/api/v1/sessions/$SESSION_ID/artifacts | head -c 400
          echo

          echo "--- Artifact preview"
          PREVIEW_JSON=$(curl -fsS http://127.0.0.1:8000/api/v1/artifacts/$ART_ID/preview)
          echo "$PREVIEW_JSON" | head -c 400
          echo
          python -c "import sys,json; j=json.load(sys.stdin); assert j.get('kind') in ('markdown','text','code'); assert 'CI Artifact' in (j.get('text') or '')" <<< "$PREVIEW_JSON"

          echo "--- Artifact download (content)"
          ART_BYTES=$(curl -fsS http://127.0.0.1:8000/api/v1/artifacts/$ART_ID/content | head -c 2000)
          echo "$ART_BYTES" | head -c 200
          echo
          echo "$ART_BYTES" | grep -q "CI Artifact"

          kill $API_PID

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Frontend build (Next.js)
        run: npm run build
